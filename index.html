<!DOCTYPE html>
<html>
<head>
    <title>Escape the Lab</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f4f4f4;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        #maze {
            display: grid;
            grid-template-columns: repeat(5, 80px);
            gap: 5px;
            justify-content: center;
            margin: 20px auto;
        }

        .cell {
            width: 80px;
            height: 80px;
            border: 1px solid black;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }

        .path {
            background: #d4f5d4;
        }

        .robot {
            background: orange;
        }

        .goal {
            background: #ff9999;
        }

        button {
            padding: 10px 16px;
            margin: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        #instructions {
            margin-top: 15px;
            font-size: 16px;
            min-height: 30px;
        }
    </style>
</head>
<body>

    <h1>Escape the Lab</h1>
    <p>Help the robot reach the finish by arranging commands.</p>

    <div id="maze"></div>

    <div>
        <button onclick="addInstruction('Forward')">Move Forward</button>
        <button onclick="addInstruction('Left')">Turn Left</button>
        <button onclick="addInstruction('Right')">Turn Right</button>
        <button onclick="runGame()">Run</button>
        <button onclick="resetGame()">Reset</button>
    </div>

    <p><strong>Your Instructions:</strong></p>
    <p id="instructions"></p>

    <script>
        const maze = document.getElementById("maze");
        const instructionDisplay = document.getElementById("instructions");

        let instructions = [];
        let robotPosition = 0;
        let direction = "right";

        const validPath = [0, 1, 2, 7, 12, 13, 14];
        const finishPosition = 14;

        function createMaze() {
            maze.innerHTML = "";

            for (let i = 0; i < 15; i++) {
                const cell = document.createElement("div");
                cell.classList.add("cell");

                if (validPath.includes(i)) {
                    cell.classList.add("path");
                }

                if (i === 0) {
                    cell.textContent = "START";
                }

                if (i === finishPosition) {
                    cell.classList.add("goal");
                    cell.textContent = "FINISH";
                }

                maze.appendChild(cell);
            }

            drawRobot();
        }

        function drawRobot() {
            const cells = document.querySelectorAll(".cell");
            cells.forEach(cell => cell.classList.remove("robot"));
            cells[robotPosition].classList.add("robot");
        }

        function addInstruction(command) {
            instructions.push(command);
            instructionDisplay.textContent = instructions.join(" → ");
        }

        function moveForward() {
            if (direction === "right") robotPosition += 1;
            else if (direction === "left") robotPosition -= 1;
            else if (direction === "down") robotPosition += 5;
            else if (direction === "up") robotPosition -= 5;
        }

        function turnLeft() {
            if (direction === "right") direction = "up";
            else if (direction === "up") direction = "left";
            else if (direction === "left") direction = "down";
            else if (direction === "down") direction = "right";
        }

        function turnRight() {
            if (direction === "right") direction = "down";
            else if (direction === "down") direction = "left";
            else if (direction === "left") direction = "up";
            else if (direction === "up") direction = "right";
        }

        function runGame() {
            let step = 0;

            const interval = setInterval(() => {
                if (step >= instructions.length) {
                    clearInterval(interval);

                    if (robotPosition === finishPosition) {
                        alert("Success! Robot escaped!");
                    } else {
                        alert("Robot got lost. Try again.");
                    }
                    return;
                }

                const command = instructions[step];

                if (command === "Forward") {
                    moveForward();
                } else if (command === "Left") {
                    turnLeft();
                } else if (command === "Right") {
                    turnRight();
                }

                drawRobot();
                step++;
            }, 700);
        }

        function resetGame() {
            instructions = [];
            robotPosition = 0;
            direction = "right";
            instructionDisplay.textContent = "";
            drawRobot();
        }

        createMaze();
    </script>

</body>
</html>
